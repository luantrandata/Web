backend:
  name: git-gateway
  branch: main

# Nơi lưu ảnh khi admin upload qua trang quản trị,
# và đường dẫn public để website hiển thị ảnh đó.
media_folder: "images/uploads"
public_folder: "/images/uploads"

publish_mode: simple

locale: "vi"

collections:
  - name: "site"
    label: "Nội dung trang web"
    files:
      - file: "content/site.json"
        label: "Toàn bộ nội dung"
        name: "site"
        format: "json"
        fields:
          - label: "Trang chủ (Hero)"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Dòng chữ nhỏ phía trên tiêu đề", name: "eyebrow", widget: "string" }
              - { label: "Tiêu đề chính (xuống dòng = Enter)", name: "title", widget: "text" }
              - { label: "Đoạn mô tả ngắn", name: "subtitle", widget: "text" }

          - label: "Triết lý thương hiệu"
            name: "philosophy"
            widget: "object"
            fields:
              - { label: "Tiêu đề (xuống dòng = Enter)", name: "heading", widget: "text" }
              - { label: "Đoạn mở đầu (in đậm)", name: "lead", widget: "text" }
              - { label: "Đoạn văn tiếp theo", name: "paragraph", widget: "text" }
              - { label: "Câu trích dẫn nổi bật", name: "quote", widget: "text" }
              - label: "Số liệu (3 ô thống kê)"
                name: "stats"
                widget: "list"
                fields:
                  - { label: "Con số", name: "number", widget: "string" }
                  - { label: "Nhãn giải thích", name: "label", widget: "string" }

          - label: "Bộ sưu tập sản phẩm"
            name: "collections"
            widget: "list"
            summary: "{{name}} — {{price}}"
            fields:
              - { label: "Tên sản phẩm", name: "name", widget: "string" }
              - { label: "Mô tả ngắn", name: "description", widget: "string" }
              - { label: "Giá (VD: Từ 6.900.000₫)", name: "price", widget: "string" }
              - label: "Ảnh sản phẩm (bỏ trống để dùng icon minh hoạ mặc định)"
                name: "image"
                widget: "image"
                required: false

          - label: "Đánh giá khách hàng"
            name: "testimonials"
            widget: "list"
            summary: "{{name}} — {{title}}"
            fields:
              - { label: "Câu trích dẫn", name: "quote", widget: "text" }
              - { label: "Tên khách hàng", name: "name", widget: "string" }
              - { label: "Chức danh / công ty", name: "title", widget: "string" }

          - label: "Thông tin liên hệ"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Địa chỉ xưởng may", name: "address", widget: "string" }
              - { label: "Số điện thoại", name: "phone", widget: "string" }
              - { label: "Email", name: "email", widget: "string" }
              - { label: "Giờ mở cửa", name: "hours", widget: "string" }
